name: Flet Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flet yt-dlp

      - name: Build APK
        run: |
          flet build -t android

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flet-app
          path: ./build/**/*.apk
